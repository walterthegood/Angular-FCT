<h1>Bienvenido al Contador</h1>
<h1 class="counterSignal">Contador Signal: {{counterSingal()}}</h1>
<h2>Componente de Contador</h2>
<h3>Primer ejercicio</h3>
<p class="counter">Counter: {{ counter }}</p>
<div class="botones">
    <button (click)="increaseByOne(1)">+1</button>
    <button (click)="decreaseByOne(1)">-1</button>
    <button (click)="resetCounter()">Resetear</button>
</div>
