<h1>Pagina del Dragon Ball</h1>
<hr>

<section class="row">

    <div class="col-12 col-sm-6">
        <h3>Agregar {{name()}}</h3>
        <input type="text" class="form-control mb-2" placeholder="Nombre" [value]="name()"
            (change)="name.set(txtName.value)" (input)="name.set(txtName.value)" #txtName />

        <h3>Poder {{powerLevel()}}</h3>
        <input type="number" class="form-control mb-2" placeholder="Poder" [value]="powerLevel()"
            (change)="powerLevel.set(txtPower.valueAsNumber)" (input)="powerLevel.set(txtPower.valueAsNumber)"
            #txtPower />

        <button (click)="addCharacter()" class="mt-2 btn btn-success">Agregar</button>
    </div>

    <div class="col-12 col-sm-6">
        <h3>Listado de fuertes:</h3>
        <ul>
            @for(character of characters(); track character.id; let i = $index){

            @if(character.powerLevel >500){
            <li>
                <span>{{i + 1}} - {{character.name}}</span>
                <strong [class.text-danger]="character.powerLevel >= 9000"
                    [class.text-info]="character.powerLevel < 9000">
                    {{character.powerLevel }}</strong>
            </li>
            }
            @else {
            <li>
                <strong>No hay nadie</strong>
            </li>}
            }

        </ul>
    </div>

</section>
