<h3>Agregar {{name()}}</h3>
<input type="text" class="form-control mb-2" placeholder="Nombre" [value]="name()" (change)="name.set(txtName.value)"
  (input)="name.set(txtName.value)" #txtName />

<h3>Poder {{powerLevel()}}</h3>
<input type="number" class="form-control mb-2" placeholder="Poder" [value]="powerLevel()"
  (change)="powerLevel.set(txtPower.valueAsNumber)" (input)="powerLevel.set(txtPower.valueAsNumber)" #txtPower />

<button (click)="addCharacter()" class="mt-2 btn btn-success">Agregar</button>
